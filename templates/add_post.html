{% extends 'base.html' %}

{% block title %}

发布文章

{% endblock %}

{% block content %}

<div class="glass form-card">

    <h2>发布文章</h2>

    <form method="POST">

        <input

            type="text"

            name="title"

            placeholder="文章标题"

            required>

        <select

            name="category">

            {% for c in categories %}

            <option

                value="{{ c.id }}">

                {{ c.name }}

            </option>

            {% endfor %}

        </select>

        <textarea

            name="content"

            rows="15"

            placeholder="Markdown内容"

            required></textarea>

        <button

            type="submit"

            class="btn btn-primary">

            发布文章

        </button>

    </form>

</div>

{% endblock %}
