{% extends 'base.html' %}

{% block title %}

登录

{% endblock %}

{% block content %}

<div class="auth-card glass">

    <h2>用户登录</h2>

    <form method="POST">

        <input

            type="text"

            name="username"

            placeholder="用户名"

            required>

        <input

            type="password"

            name="password"

            placeholder="密码"

            required>

        <button

            type="submit"

            class="btn btn-primary">

            登录

        </button>

    </form>

</div>

{% endblock %}
