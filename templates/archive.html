{% extends 'base.html' %}

{% block content %}

<h1>时间归档</h1>

{% for post in posts %}

<div class="post-card glass">

    <h2>

        <a href="{{ url_for(

        'detail',

        post_id=post.id) }}">

            {{ post.title }}

        </a>

    </h2>

    <p>

        {{ post.create_time.strftime('%Y-%m-%d') }}

    </p>

</div>

{% endfor %}

{% endblock %}
