{% extends 'base.html' %}

{% block title %}

注册

{% endblock %}

{% block content %}

<div class="auth-card glass">

    <h2>用户注册</h2>

    <form method="POST">

        <input

            type="text"

            name="username"

            placeholder="用户名"

            required>

        <input

            type="email"

            name="email"

            placeholder="邮箱"

            required>

        <input

            type="password"

            name="password"

            placeholder="密码"

            required>

        <button

            type="submit"

            class="btn btn-primary">

            注册

        </button>

    </form>

</div>

{% endblock %}
