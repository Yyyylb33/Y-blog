{% extends 'base.html' %}

{% block title %}

编辑文章

{% endblock %}

{% block content %}

<div class="glass form-card">

    <h2>编辑文章</h2>

    <form method="POST">

        <input

            type="text"

            name="title"

            value="{{ post.title }}"

            required>

        <select

            name="category">

            {% for c in categories %}

            <option

                value="{{ c.id }}"

                {% if c.id==post.category_id %}

                selected

                {% endif %}>

                {{ c.name }}

            </option>

            {% endfor %}

        </select>

        <textarea

            name="content"

            rows="15"

            required>{{ post.content }}</textarea>

        <button

            type="submit"

            class="btn btn-primary">

            保存修改

        </button>

    </form>

</div>

{% endblock %}
