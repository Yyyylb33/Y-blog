{% extends 'base.html' %}

{% block content %}

<h1>

搜索结果：

{{ keyword }}

</h1>

{% for post in posts %}

<div class="post-card glass">

    <h2>

        <a href="{{ url_for(

        'detail',

        post_id=post.id) }}">

            {{ post.title }}

        </a>

    </h2>

</div>

{% endfor %}

{% endblock %}
